openapi: 3.0.3
info:
  title: Umbra Agent Identity Control Plane API
  version: 0.1.0
  description: |
    Contract rules:
    - /v1/decision changes must be additive only.
    - Breaking changes require an ADR and a new versioned endpoint (e.g. /v2/decision).
servers:
  - url: http://localhost:8080
    description: Local Control Plane API
tags:
  - name: decision
  - name: tools
  - name: policies
  - name: receipts

paths:
  /v1/decision:
    post:
      tags: [decision]
      summary: Evaluate a policy decision (PDP)
      operationId: postDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Policy evaluation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: PDP unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools:
    get:
      tags: [tools]
      summary: List tools (tenant-scoped)
      operationId: listTools
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolList'
    post:
      tags: [tools]
      summary: Create tool (tenant-scoped)
      operationId: createTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToolRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'

  /v1/policies:
    get:
      tags: [policies]
      summary: List policies (tenant-scoped)
      operationId: listPolicies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyList'
    post:
      tags: [policies]
      summary: Create policy (tenant-scoped)
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'

  /v1/policies/activate:
    post:
      tags: [policies]
      summary: Activate a policy by ID (tenant-scoped)
      operationId: activatePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy_id: { type: string }
              required: [policy_id]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /v1/policies/simulate:
    post:
      tags: [policies]
      summary: Simulate a decision against active policy (or supplied policy JSON)
      operationId: simulatePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateResponse'

  /v1/receipts:
    get:
      tags: [receipts]
      summary: List recent receipts (decision + invocation)
      operationId: listReceipts
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: kind
          schema: { type: string, enum: [decision, invocation] }
        - in: query
          name: q
          schema: { type: string }
          description: Best-effort substring search across receipt JSON (V0)
        - in: query
          name: before
          schema: { type: string, format: date-time }
          description: Cursor for pagination (RFC3339 timestamp, exclusive)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptList'

  /v1/receipts/export:
    get:
      tags: [receipts]
      summary: Export receipts (JSON or CSV)
      operationId: exportReceipts
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: actor_id
          schema: { type: string }
        - in: query
          name: tool
          schema: { type: string }
        - in: query
          name: decision
          schema: { type: string, enum: [allow, deny] }
        - in: query
          name: request_id
          schema: { type: string }
        - in: query
          name: decision_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptExportResponse'
            text/csv:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          enum: [POLICY_DENIED, POLICY_INVALID, POLICY_UNAVAILABLE]
        message: { type: string }
        request_id: { type: string }
        decision_id: { type: string }
        trace_id: { type: string }
      required: [error_code, message]

    TenantContext:
      type: object
      properties:
        tenant_id: { type: string }
      required: [tenant_id]

    Actor:
      type: object
      properties:
        type: { type: string }
        id: { type: string }
        roles:
          type: array
          items: { type: string }
        source: { type: string }
      required: [type, id]

    ToolContext:
      type: object
      properties:
        name: { type: string }
        method: { type: string }
        endpoint: { type: string }
      required: [name, method, endpoint]

    MCPContext:
      type: object
      properties:
        server: { type: string }
        tool: { type: string }
        method: { type: string }
        workspace: { type: string }
      required: [server, tool, method]

    TraceContext:
      type: object
      properties:
        request_id: { type: string }
        trace_id: { type: string }
        span_id: { type: string }

    DecisionRequest:
      type: object
      properties:
        tenant:
          $ref: '#/components/schemas/TenantContext'
        actor:
          $ref: '#/components/schemas/Actor'
        tool:
          $ref: '#/components/schemas/ToolContext'
        mcp:
          $ref: '#/components/schemas/MCPContext'
        trace:
          $ref: '#/components/schemas/TraceContext'
      required: [tenant, actor, tool]

    Obligation:
      type: object
      properties:
        kind: { type: string }
        params:
          type: object
          additionalProperties: { type: string }
      required: [kind]

    DecisionResponse:
      type: object
      properties:
        decision: { type: string, enum: [allow, deny] }
        decision_id: { type: string }
        policy_version: { type: integer }
        policy_hash: { type: string }
        rule_index: { type: integer, nullable: true }
        obligations:
          type: array
          items:
            $ref: '#/components/schemas/Obligation'
        reason: { type: string }
        request_id: { type: string }
        trace_id: { type: string }
        span_id: { type: string }
      required: [decision, decision_id]

    Tool:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string }
        config: { type: object }
      required: [id, name, kind]

    ToolList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Tool' }

    CreateToolRequest:
      type: object
      properties:
        name: { type: string }
        kind: { type: string }
        config: { type: object }
      required: [name, kind]

    Policy:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        version: { type: integer }
        active: { type: boolean }
        policy_hash: { type: string }
        policy:
          type: object
          description: JSON policy document
      required: [id, name, version, active, policy_hash]

    PolicyList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Policy' }

    CreatePolicyRequest:
      type: object
      properties:
        name: { type: string }
        policy: { type: object }
      required: [name, policy]

    SimulateRequest:
      type: object
      properties:
        actor_roles:
          type: array
          items: { type: string }
        method: { type: string }
        path: { type: string }
        policy:
          type: object
          description: Optional policy JSON to simulate against instead of active policy
      required: [method, path]

    SimulateResponse:
      type: object
      properties:
        decision: { type: string, enum: [allow, deny] }
        reason: { type: string }
        rule_index: { type: integer, nullable: true }
        policy_hash: { type: string }
        policy_version: { type: integer }
      required: [decision, reason]

    ReceiptList:
      type: object
      properties:
        items:
          type: array
          items: { type: object }
        next_before:
          type: string
          format: date-time

    ReceiptExportResponse:
      type: object
      properties:
        schema_version: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReceiptExportRecord'
      required: [schema_version, items]

    ReceiptExportRecord:
      type: object
      properties:
        schema_version: { type: string }
        kind: { type: string, enum: [decision, invocation] }
        ts: { type: string, format: date-time }
        request_id: { type: string }
        decision_id: { type: string }
        trace_id: { type: string }
        policy_hash: { type: string }
        policy_version: { type: integer }
        decision: { type: string, enum: [allow, deny] }
        actor_id: { type: string }
        tool_name: { type: string }
        method: { type: string }
        path: { type: string }
        outcome: { type: string }
        status_code: { type: integer }
        receipt_hash: { type: string }
        receipt_prev_hash: { type: string }
      required: [schema_version, kind, ts, receipt_hash]
