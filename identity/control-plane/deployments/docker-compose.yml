services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: umbra
      POSTGRES_DB: umbra
    ports:
      - "5432:5432"
    volumes:
      - ./local/.data/postgres:/var/lib/postgresql/data
      - ../migrations:/migrations:ro

  redis:
    profiles: ["obs"]
    image: redis:7
    ports:
      - "6379:6379"

  upstream-sample:
    image: hashicorp/http-echo:1.0.0
    command: ["-listen=:9000", "-text=hello-from-upstream"]
    ports:
      - "9000:9000"

  mcp-upstream:
    build:
      context: ..
      dockerfile: services/mcp-upstream/Dockerfile
    environment:
      PORT: "8090"
    ports:
      - "8090:8090"

  jaeger:
    profiles: ["obs"]
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"

  otel-collector:
    profiles: ["obs"]
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  controlplane-api:
    build:
      context: ..
      dockerfile: services/controlplane-api/Dockerfile
    environment:
      UMBRA_ENV: dev
      DATABASE_URL: postgres://umbra:umbra@postgres:5432/umbra?sslmode=disable
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      UMBRA_AUTH_ENABLED: ${UMBRA_AUTH_ENABLED:-false}
      UMBRA_AUTH_JWT_HS256_SECRET: ${UMBRA_AUTH_JWT_HS256_SECRET:-}
      UMBRA_AUTH_JWT_ISSUER: ${UMBRA_AUTH_JWT_ISSUER:-}
      UMBRA_AUTH_JWT_AUDIENCE: ${UMBRA_AUTH_JWT_AUDIENCE:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  pdp:
    build:
      context: ..
      dockerfile: services/pdp/Dockerfile
    environment:
      UMBRA_ENV: dev
      DATABASE_URL: postgres://umbra:umbra@postgres:5432/umbra?sslmode=disable
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  pep-gateway:
    build:
      context: ..
      dockerfile: services/pep-gateway/Dockerfile
    environment:
      UMBRA_ENV: dev
      PEP_MODE: ${PEP_MODE:-observe}
      PDP_URL: http://pdp:8081
      UPSTREAM_URL: http://upstream-sample:9000
      DATABASE_URL: postgres://umbra:umbra@postgres:5432/umbra?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      PORT: "8082"
    ports:
      - "8082:8082"
    depends_on:
      - pdp
      - postgres
      - otel-collector
      - upstream-sample

  mcp-adapter:
    build:
      context: ..
      dockerfile: services/mcp-adapter/Dockerfile
    environment:
      UMBRA_ENV: dev
      PEP_MODE: ${PEP_MODE:-observe}
      PDP_URL: http://pdp:8081
      MCP_UPSTREAM_URL: http://mcp-upstream:8090/mcp
      MCP_TENANT_ID: 00000000-0000-0000-0000-000000000001
      MCP_ACTOR_ID: user-1
      MCP_ACTOR_ROLES: developer
      MCP_SERVER_NAME: demo.mcp
      DATABASE_URL: postgres://umbra:umbra@postgres:5432/umbra?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      PORT: "8083"
    ports:
      - "8083:8083"
    depends_on:
      - pdp
      - postgres
      - otel-collector
      - mcp-upstream

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    environment:
      CONTROLPLANE_API_URL: http://controlplane-api:8080
      NEXT_PUBLIC_TENANT_ID: ""
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
      NEXT_PUBLIC_AUTH_DEV_TOKEN_ENABLED: ${NEXT_PUBLIC_AUTH_DEV_TOKEN_ENABLED:-}
      UMBRA_AUTH_JWT_HS256_SECRET: ${UMBRA_AUTH_JWT_HS256_SECRET:-}
      UMBRA_AUTH_JWT_ISSUER: ${UMBRA_AUTH_JWT_ISSUER:-}
      UMBRA_AUTH_JWT_AUDIENCE: ${UMBRA_AUTH_JWT_AUDIENCE:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - controlplane-api
